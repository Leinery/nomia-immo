kind = "web"
previewPath = "/"
title = "Immobilienverwaltung"
version = "1.0.0"
id = "artifacts/immo-dashboard"
router = "path"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22010

[services.development]
run = "pnpm --filter @workspace/immo-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/immo-dashboard", "run", "build" ]
serve = "static"
publicDir = "artifacts/immo-dashboard/dist/public"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22010"
BASE_PATH = "/"
